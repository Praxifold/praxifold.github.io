function fromBase64(base64){

const binary = atob(base64);

const bytes = new Uint8Array(binary.length);

for(let i=0;i<binary.length;i++){
bytes[i]=binary.charCodeAt(i);
}

return bytes;
}

function isExpired(){

if(payload.expire === null){
return false;
}

return Date.now() >= payload.expire;
}

async function derive(password,salt){

const keyMaterial =
await crypto.subtle.importKey(
"raw",
new TextEncoder().encode(password),
{name:"PBKDF2"},
false,
["deriveKey"]
);

return crypto.subtle.deriveKey(
{
name:"PBKDF2",
salt:salt,
iterations:payload.iterations,
hash:"SHA-256"
},
keyMaterial,
{
name:"AES-GCM",
length:256
},
false,
["decrypt"]
);
}

let unlockCooldown = false;

const button =
document.getElementById("unlockBtn");

const error =
document.getElementById("error");

if(isExpired()){

button.disabled = true;

document.getElementById("pw").disabled = true;

error.textContent =
"Jūsų versija yra per sena ir buvo užrakinta saugumo sumetimais. Atsisiųskite naujesnę versiją iš praxifold.github.io";
}

document.getElementById("unlockBtn").onclick =
async ()=>{

if(unlockCooldown || isExpired()){
return;
}

try{

const password =
document.getElementById("pw").value;

error.textContent = "";

button.disabled = true;

button.textContent =
"Decrypting...";

const key =
await derive(
password,
fromBase64(payload.salt)
);

const decrypted =
await crypto.subtle.decrypt(
{
name:"AES-GCM",
iv:fromBase64(payload.iv)
},
key,
fromBase64(payload.data)
);

const html =
new TextDecoder().decode(decrypted);

document.open();
document.write(html);
document.close();

}catch(e){

unlockCooldown = true;

let seconds = payload.delay || 5;

button.disabled = true;

button.textContent =
"Locked";

error.textContent =
"Neteisingas slaptažodis. Palaukite " + seconds + " sek.";

const interval =
setInterval(()=>{

seconds--;

if(seconds > 0){

error.textContent =
"Neteisingas slaptažodis. Palaukite " +
seconds +
" seconds.";

}else{

clearInterval(interval);

unlockCooldown = false;

button.disabled = false;

button.textContent =
"Unlock";

error.textContent = "";
}

},1000);

}finally{

if(!unlockCooldown && !isExpired()){

button.disabled = false;

button.textContent =
"Unlock";
}

}
};

</script>

</body>
</html>
