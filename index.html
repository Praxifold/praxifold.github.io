<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxifold - Prisijungimas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        h2 { color: #0078D7; margin-bottom: 20px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; font-family: inherit; }
        input:focus, select:focus { outline: none; border-color: #0078D7; }
        .btn { background: #0078D7; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 8px; transition: background 0.2s; }
        .btn:hover { background: #005a9e; }
        .switch-link { margin-top: 12px; display: block; color: #666; text-decoration: none; font-size: 14px; text-align: center; cursor: pointer; }
        .switch-link:hover { color: #0078D7; }
        #role-other-wrap { display: none; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #0078D7; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #geo-blocked { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:10000; flex-direction:column; align-items:center; justify-content:center; color:#333; font-family: sans-serif; text-align:center; padding:20px; }
        #geo-blocked h1 { color:#d9534f; margin-bottom:10px; }
        .cookie-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.55); z-index:5000; align-items:center; justify-content:center; padding:20px; }
        .cookie-box { background:white; padding:30px; border-radius:10px; max-width:420px; width:100%; }
        .cookie-box h3 { color:#0078D7; margin-bottom:10px; }
        .cookie-box p { font-size:13px; color:#555; margin-bottom:18px; line-height:1.6; }
        .cookie-btns { display:flex; gap:10px; }
        .cookie-btns button { flex:1; padding:11px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; font-size:14px; transition: opacity 0.2s; }
        .cookie-btns button:hover { opacity: 0.85; }
        .btn-all { background:#0078D7; color:white; }
        .btn-necessary { background:#e1dfdd; color:#333; }
        .brand-logo { display: block; height: 46px; margin: 0 auto 10px; }
        .pass-msg { font-size:12px; display:block; min-height:16px; margin-top:3px; margin-bottom:2px; }
        .pass-confirm-wrap { position:relative; margin:8px 0 0 0; }
        .pass-confirm-wrap input { margin:0; width:100%; padding-right:44px; }
        .pass-confirm-wrap .eye-btn { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:16px; color:#999; line-height:1; padding:2px 4px; }
        .pass-confirm-wrap .eye-btn:hover { color:#555; }
        .consent-row { display:flex; align-items:flex-start; gap:8px; font-size:12px; color:#555; line-height:1.5; margin:10px 0; cursor:pointer; }
        .consent-row input[type=checkbox] { width:auto; margin:2px 0 0 0; flex-shrink:0; }
        .consent-row a { color:#0078D7; font-weight:bold; text-decoration:underline; }
    </style>
</head>
<body oncontextmenu="return false;">
    <!-- Full original HTML content here - same as provided -->
    <!-- (I kept it identical except script) -->

    <div id="geo-blocked"> ... </div>
    <!-- ... all HTML from your original index.html ... -->

    <script>
        const GAS_URL = "https://script.google.com/macros/s/YOUR_DEPLOYED_URL/exec"; // ← pakeiskite po deploy
        const APPEAL_URL = "https://docs.google.com/forms/d/e/1FAIpQLSec24sYXhB-C3MrbTBKbCNhFwsGLY6xMoLRhkiRHp6DCX48bg/viewform?usp=header";
        let pendingSignup = null;

        // ... all original functions ...

        function proceedSignup(cookieChoice) {
            document.getElementById('cookie-overlay').style.display = 'none';
            if (!pendingSignup) return;
            const roleLower = pendingSignup.role.toLowerCase();
            if (roleLower === "developer" || roleLower === "praxifold developer") {
                alert("Nurodykite tikslią rolę (pvz.: inžinierius, mokytojas). 'Developer' draudžiama.");
                return;
            }
            showLoader();
            fetch(GAS_URL, { method:"POST", body: JSON.stringify({ action:"signup", ...pendingSignup, cookies: cookieChoice }) })
            .then(r => r.json())
            .then(data => {
                hideLoader();
                if (data.success) {
                    document.cookie = `token=${data.token}; path=/; max-age=86400;`;
                    window.location.href = "dashboard.html";
                } else {
                    alert(data.error === "EL_PASTAS_JAU_EGZISTUOJA" ? "Šis el. paštas jau užregistruotas." : "Klaida: " + data.error);
                }
            }).catch(() => { hideLoader(); alert("Registracijos klaida."); });
        }

        // ... rest of original script unchanged ...
    </script>
</body>
</html>
