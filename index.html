<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxifold</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        img.logo { max-width: 150px; margin-bottom: 20px; }
        .btn { background: #0078D7; color: white; border: none; padding: 12px 20px; margin: 10px 0; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #005a9e; }
        .btn-secondary { background: #e1dfdd; color: #333; }
        .btn-secondary:hover { background: #c8c6c4; }
        .hidden { display: none; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .error-msg { color: red; font-size: 12px; margin-top: -5px; margin-bottom: 10px; display: block; }
        a { color: #0078D7; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container" id="main-menu">
        <img src="logo.png" alt="Logo" class="logo">
        <div id="loading-ip">Tikrinamas regionas...</div>
        <div id="auth-buttons" class="hidden">
            <button class="btn" onclick="showSection('signup-section')">Aš čia naujokas (Registruotis)</button>
            <button class="btn btn-secondary" onclick="showSection('login-section')">Turiu paskyrą (Prisijungti)</button>
        </div>
    </div>

    <div class="container hidden" id="signup-section">
        <h2>Registracija</h2>
        <input type="text" id="reg-name" placeholder="Pilnas vardas" required>
        <input type="email" id="reg-email" placeholder="El. paštas" required>
        <input type="password" id="reg-pass" placeholder="Slaptažodis (min 8 simboliai)" onkeyup="checkPassword()" required>
        <span id="pass-feedback" class="error-msg"></span>
        <input type="password" id="reg-pass2" placeholder="Pakartokite slaptažodį" required>
        <select id="reg-role">
            <option value="Teacher">Mokytojas (Teacher)</option>
            <option value="Engineer">Inžinierius (Engineer)</option>
            <option value="Hobbyist">Mėgėjas (Hobbyist)</option>
            <option value="Other">Kita (Other)</option>
        </select>
        <div style="text-align: left; font-size: 12px; margin-bottom: 10px;">
            <input type="checkbox" id="reg-terms" required style="width: auto;"> Registruodamiesi sutinkate su mūsų <a href="policy.txt" target="_blank">Naudojimo sąlygomis ir Privatumo politika</a>.<br><br>
            <input type="radio" name="cookies" value="all" checked style="width: auto;"> Visi slapukai
            <input type="radio" name="cookies" value="necessary" style="width: auto;"> Tik būtini slapukai
        </div>
        <button class="btn" onclick="submitSignup()">Sukurti paskyrą</button>
        <button class="btn btn-secondary" onclick="showSection('main-menu')">Atgal</button>
    </div>

    <div class="container hidden" id="login-section">
        <h2>Prisijungti</h2>
        <input type="email" id="log-email" placeholder="El. paštas" required>
        <input type="password" id="log-pass" placeholder="Slaptažodis" required>
        <button class="btn" onclick="submitLogin()">Prisijungti</button>
        <button class="btn btn-secondary" onclick="showSection('main-menu')">Atgal</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwM5V48Z1c7goUQ-3JLKA2yRU1BbQHgOBQOl1Xaw8o3KBRLzFM8FVAYKetok50mXKXZ/exec"; // Paste your GAS Web App URL here
        let userIP = "0.0.0.0";
        let userBrowser = navigator.userAgent;

        window.onload = function() {
            fetch('https://ipapi.co/json/')
                .then(response => response.json())
                .then(data => {
                    userIP = data.ip;
                    if (data.country_code === 'LT') {
                        document.getElementById('loading-ip').classList.add('hidden');
                        document.getElementById('auth-buttons').classList.remove('hidden');
                    } else {
                        showError("010");
                        document.getElementById('loading-ip').innerText = "Prieiga negalima iš jūsų regiono.";
                    }
                })
                .catch(err => {
                    showError("0010");
                    document.getElementById('loading-ip').innerText = "Nepavyko patikrinti regiono.";
                });
        };

        function showSection(id) {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('signup-section').classList.add('hidden');
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function checkPassword() {
            const pass = document.getElementById('reg-pass').value;
            const feedback = document.getElementById('pass-feedback');
            feedback.innerText = pass.length < 8 ? "Slaptažodis turi būti bent 8 simbolių." : "";
        }

        function showError(code) {
            alert(`Klaida ${code}: Prašome susisiekti su palaikymo komanda praxifold@gmail.com`);
        }

        function submitSignup() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const pass2 = document.getElementById('reg-pass2').value;
            const role = document.getElementById('reg-role').value;
            const terms = document.getElementById('reg-terms').checked;
            const cookies = document.querySelector('input[name="cookies"]:checked').value;

            if (pass !== pass2 || pass.length < 8) return alert("Slaptažodžiai nesutampa arba yra per trumpi.");
            if (!terms) return alert("Privalote sutikti su sąlygomis.");

            const payload = {
                action: "signup", name: name, email: email, password: pass, role: role,
                ip: userIP, browser: userBrowser, cookies: cookies
            };

            fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) })
                .then(res => res.json()).then(data => {
                    if (data.success) {
                        document.cookie = `token=${data.token}; path=/; max-age=600`; 
                        window.location.href = "dashboard.html"; 
                    } else {
                        showError(data.error);
                    }
                }).catch(e => showError("060"));
        }

        function submitLogin() {
            const email = document.getElementById('log-email').value;
            const pass = document.getElementById('log-pass').value;

            const payload = { action: "login", email: email, password: pass, ip: userIP };

            fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) })
                .then(res => res.json()).then(data => {
                    if (data.success) {
                        document.cookie = `token=${data.token}; path=/; max-age=600`;
                        window.location.href = "dashboard.html";
                    } else {
                        showError(data.error);
                    }
                }).catch(e => showError("060"));
        }
    </script>
</body>
</html>
