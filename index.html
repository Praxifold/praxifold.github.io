<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxifold - Prisijungimas</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 350px; text-align: center; }
        h2 { color: #0078D7; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { background: #0078D7; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        .btn:hover { background: #005a9e; }
        .switch-link { margin-top: 15px; display: block; color: #666; text-decoration: none; font-size: 14px; }
        
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #0078D7; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { font-size: 18px; font-weight: bold; color: #333; max-width: 450px; line-height: 1.5; }
        
        #geo-blocked { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:10000; flex-direction:column; align-items:center; justify-content:center; color:#333; }
        #geo-blocked h1 { color:#d9534f; margin-bottom:10px; }
    </style>
</head>
<body>

    <div id="geo-blocked">
        <h1>Prieiga apribota (403 Forbidden)</h1>
        <p>Apgailestaujame, tačiau ši svetainė yra prieinama tik vartotojams, esantiems Lietuvos teritorijoje.</p>
    </div>

    <div id="security-loader" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loader-text">Tikrinama saugi prieiga...</div>
    </div>

    <div class="box" id="login-box">
        <h2>Prisijungti</h2>
        <input type="email" id="login-email" placeholder="El. paštas">
        <input type="password" id="login-pass" placeholder="Slaptažodis">
        <button class="btn" onclick="login()">Prisijungti</button>
        <a href="#" class="switch-link" onclick="toggleForm('register-box')">Neturite paskyros? Registruotis</a>
    </div>

    <div class="box" id="register-box" style="display:none;">
        <h2>Registracija</h2>
        <input type="text" id="reg-name" placeholder="Vardas Pavardė">
        <input type="email" id="reg-email" placeholder="El. paštas">
        <input type="password" id="reg-pass" placeholder="Slaptažodis">
        <button class="btn" onclick="signup()">Registruotis</button>
        <a href="#" class="switch-link" onclick="toggleForm('login-box')">Jau turite paskyrą? Prisijungti</a>
    </div>

    <script>
        // ĮKLIJUOKITE SAVO WEB APP URL ŽEMIAU:
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzgeXTQl5K9P_MYDVxgEtVQyi0a94ms8nbs7yJjhwNRgQXwOYu30_vKwd7-jOYRd07a/exec"; 
        
        let clientIp = "";

        // Užsikrovus puslapiui, tikriname geografinę vietą iš kliento pusės
        window.onload = function() {
            checkClientGeo();
        };

        function toggleForm(id) {
            document.getElementById('login-box').style.display = id === 'login-box' ? 'block' : 'none';
            document.getElementById('register-box').style.display = id === 'register-box' ? 'block' : 'none';
        }

        function showLoader(text) { 
            if(text) document.getElementById('loader-text').innerText = text;
            document.getElementById('security-loader').style.display = 'flex'; 
        }
        function hideLoader() { document.getElementById('security-loader').style.display = 'none'; }

        // Ši funkcija pasileidžia tavo naršyklėje, todėl tiksliai mato tavo LT vietą pagal IP
        function checkClientGeo() {
            showLoader("Tikrinama jūsų prieigos vieta...");
            
            fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(geo => {
                hideLoader();
                if (geo.country_code !== "LT") {
                    document.getElementById('geo-blocked').style.display = 'flex';
                    return;
                }
                // Jei šalis LT, išsaugome TIKRĄ kompiuterio IP adresą
                clientIp = geo.ip;
            })
            .catch(() => {
                hideLoader();
                alert("Nepavyko saugiai patvirtinti jūsų tinklo vietos. Patikrinkite interneto ryšį.");
            });
        }

        function login() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            if(!email || !pass) { alert("Užpildykite visus laukus"); return; }
            if(!clientIp) { alert("Palaukite, kol sistema nustatys jūsų saugų IP."); return; }

            showLoader("Autorizuojama paskyra...");
            
            fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "login", email: email, password: pass, ip: clientIp }) 
            })
            .then(r => r.json())
            .then(data => {
                hideLoader();
                if (data.success) {
                    document.cookie = `token=${data.token}; path=/; max-age=86400;`;
                    window.location.href = "dashboard.html";
                } else {
                    alert("Klaida: " + data.error);
                }
            })
            .catch(() => { 
                hideLoader(); 
                alert("Nepavyko prisijungti prie duomenų bazės serverio."); 
            });
        }

        function signup() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            if(!name || !email || !pass) { alert("Užpildykite visus laukus"); return; }
            if(!clientIp) { alert("Palaukite, kol sistema nustatys jūsų saugų IP."); return; }

            showLoader("Kuriama paskyra saugykloje...");
            
            fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "signup", 
                    name: name, 
                    email: email, 
                    password: pass, 
                    role: "user", 
                    ip: clientIp, // Tikrasis IP išsiunčiamas įrašymui į Sheets
                    cookies: "necessary", 
                    browser: navigator.userAgent 
                })
            })
            .then(r => r.json())
            .then(data => {
                hideLoader();
                if (data.success) {
                    alert("Registracija sėkminga! Galite prisijungti.");
                    toggleForm('login-box');
                } else {
                    alert("Klaida: " + data.error);
                }
            })
            .catch(() => { hideLoader(); alert("Registracijos klaida."); });
        }
    </script>
</body>
</html>
