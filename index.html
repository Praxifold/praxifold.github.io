<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mathexa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="status-overlay" style="display:none;">
        <div class="glass" style="text-align:center;">
            <div class="spinner"></div>
            <p id="status-text">Jungiamasi prie serverio, palaukite...</p>
        </div>
    </div>

    <div id="cookie-popup" class="glass" style="display:none; position:fixed; bottom:20px; z-index:1000; width:90%; max-width:350px;">
        <p>Naudojame slapukus užtikrinti geriausią patirtį.</p>
        <button onclick="acceptCookies('all')">Sutinku su visais</button>
        <button onclick="acceptCookies('req')" style="margin-top:10px; background:rgba(255,255,255,0.1)">Tik būtini</button>
    </div>

    <div class="container" id="app">
        <div id="auth-screen" class="glass">
            <h1 style="text-align:center; letter-spacing:-1px;">Mathexa</h1>
            
            <div id="auth-buttons">
                <button onclick="showSignUp()">Esu naujas (Sukurti paskyrą)</button>
                <button onclick="showLogin()" style="margin-top:15px; background:rgba(255,255,255,0.1)">Prisijungti</button>
            </div>

            <div id="form-area" style="display:none; margin-top:20px;">
                </div>
        </div>

        <div id="main-screen" class="glass" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Mathexa</h3>
                <span id="user-clicks" style="font-size:12px; opacity:0.8;"></span>
            </div>
            
            <div id="video-container" style="margin-top:20px;">
                </div>

            <button onclick="showSettings()" style="margin-top:20px; background:rgba(255,255,255,0.05);">Nustatymai</button>
        </div>

        <div id="settings-screen" class="glass" style="display:none;">
            <h3>Nustatymai</h3>
            <div id="settings-content">
                </div>
            <button onclick="backToMain()" style="margin-top:20px; background:none;">Grįžti atgal</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
