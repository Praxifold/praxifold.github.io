<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATHEXA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="cookie-banner" class="cookie-banner">
        <p>Ši svetainė naudoja slapukus. Pasirinkite savo nustatymus.</p>
        <button onclick="acceptCookies('all')">Priimti visus</button>
        <button onclick="acceptCookies('essential')">Tik būtini</button>
    </div>

    <div id="auth-section" class="container">
        <h1 class="logo">MATHEXA</h1>
        <div id="login-box">
            <h2>Prisijungimas</h2>
            <input type="email" id="login-email" placeholder="El. paštas">
            <input type="password" id="login-password" placeholder="Slaptažodis">
            <button onclick="app.login()">Prisijungti</button>
            <p>Neturite paskyros? <a href="#" onclick="app.toggleAuth()">Registruotis</a></p>
        </div>
        
        <div id="register-box" style="display: none;">
            <h2>Registracija</h2>
            <input type="text" id="reg-name" placeholder="Vardas Pavardė">
            <input type="email" id="reg-email" placeholder="El. paštas">
            <input type="password" id="reg-password" placeholder="Slaptažodis">
            <button onclick="app.register()">Registruotis</button>
            <p>Jau turite paskyrą? <a href="#" onclick="app.toggleAuth()">Prisijungti</a></p>
        </div>
    </div>

    <div id="app-section" class="container" style="display: none;">
        <header>
            <h1 class="logo">MATHEXA</h1>
            <nav>
                <button onclick="app.showTab('videos')">Vaizdo įrašai</button>
                <button onclick="app.showTab('settings')">Nustatymai</button>
                <button onclick="app.logout()" class="logout-btn">Atsijungti</button>
            </nav>
        </header>

        <div id="tab-videos">
            <input type="text" id="search-bar" placeholder="Ieškoti pagal pavadinimą arba temą..." onkeyup="app.searchVideos()">
            <div id="video-list" class="grid-container"></div>
        </div>

        <div id="tab-settings" style="display: none;">
            <h2>Nustatymai</h2>
            <div class="settings-card">
                <p><strong>Support ID:</strong> <span id="ui-support-id"></span> <button onclick="app.copySupportID()">Kopijuoti</button></p>
                <p><strong>Liko paspaudimų:</strong> <span id="ui-clicks"></span></p>
                <hr>
                <h3>Prenumerata</h3>
                <input type="text" id="promo-code" placeholder="Įveskite kodą">
                <button onclick="app.redeemCode()">Aktyvuoti</button>
                <hr>
                <button onclick="app.resetPassword()" class="btn-secondary">Atstatyti slaptažodį</button>
                <button onclick="app.deleteAccount()" class="btn-danger">Ištrinti paskyrą</button>
                <p id="support-email-text" style="display:none; color: #888;">Susisiekite: support@mathexa.lt</p>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="overlay" style="display: none;">
        <h2>Prašome palaukti...</h2>
    </div>

    <script src="app.js"></script>
</body>
</html>
