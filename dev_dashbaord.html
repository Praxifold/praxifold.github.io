<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxifold - Kūrėjų Panelė</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f172a, #1e2937); color: #e2e8f0; }
        header { background: #1e2937; padding: 14px 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; }
        .logo { height: 38px; transition: transform 0.25s ease; }
        .logo:hover { transform: scale(1.08); }
        .verified { background: #22c55e; color: #000; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-left: 12px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .page-title { font-size: 24px; font-weight: 700; margin-bottom: 20px; color: #60a5fa; }
        .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .filter-btn { background: #334155; color: #e2e8f0; border: none; padding: 8px 16px; border-radius: 9999px; cursor: pointer; font-size: 14px; }
        .filter-btn.active { background: #3b82f6; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }
        .card { background: #1e2937; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); position: relative; }
        .card h3 { margin: 0 0 8px 0; color: #60a5fa; padding-left: 38px; }
        .btn { border-radius: 12px; height: 46px; margin-top: 10px; font-weight: 600; }
        .settings-btn { background: #334155; color: white; border-radius: 12px; }
    </style>
</head>
<body oncontextmenu="return false;">
    <header>
        <div style="display:flex;align-items:center;">
            <img src="logo.png" alt="Praxifold" class="logo" onclick="window.location.reload()">
            <span class="verified">✅ Verified Developer</span>
        </div>
        <button class="settings-btn" onclick="openModal('settings-modal')">⚙ Nustatymai</button>
    </header>

    <div class="container">
        <div class="page-title">Įrankiai</div>
        <div class="filters" id="filters"></div>
        <div class="grid" id="file-grid"></div>

        <div style="text-align:center; margin:40px 0; font-size:14px;">
            Nerandate norimo įrankio? <a href="https://docs.google.com/forms/d/e/1FAIpQLScM5TQAPhEyBGnrxlaEPfljNJTeeBWAMpRgTohw-HAiEn6tDw/viewform?usp=header" target="_blank">Prašykite čia</a>
        </div>
    </div>

    <!-- Modals same as dashboard.html but with premium styling -->

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwx8sSBBVa6ypdLkNzmM1IWy7GVn_IAqaqGU0AY6rAG7MPIoMko64w2Do3TcRwvnUjN/exec";
        let currentUser = null;
        let allFiles = [];

        window.onload = function() {
            const token = getCookie("token");
            if (!token) { window.location.href = "index.html"; return; }
            fetchUserData(token);
        };

        function fetchUserData(token) {
            fetch(GAS_URL, { method:"POST", body: JSON.stringify({ action:"getUserData", token }) })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    currentUser = data.user;
                    currentUser.token = token;
                    allFiles = data.files;
                    renderFilters();
                    renderFiles(allFiles);
                }
            });
        }

        function renderFilters() {
            const filtersDiv = document.getElementById('filters');
            const stages = ["All", "Beta 1", "Beta 2", "Beta 3", "Beta 4", "Beta 5", "Alpha", "General", "Stable", "Legacy"];
            stages.forEach(stage => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = stage;
                btn.onclick = () => filterByStage(stage);
                filtersDiv.appendChild(btn);
            });
        }

        function filterByStage(stage) {
            let filtered = allFiles;
            if (stage !== "All") filtered = allFiles.filter(f => f.stage === stage);
            renderFiles(filtered);
        }

        function renderFiles(files) {
            const grid = document.getElementById('file-grid');
            grid.innerHTML = '';
            files.forEach(f => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <a href="https://docs.google.com/forms/d/e/1FAIpQLSeKlBK6UKrGVaRCakQQp9mZjHzIVMjx9ke1UfJr8X50F3v0bg/viewform?usp=header" target="_blank" style="position:absolute;top:12px;left:12px;font-size:22px;color:#ef4444;">🚩</a>
                    <h3>${f.name}</h3>
                    <span class="version">V${f.version} • ${f.stage}</span>
                    <button class="btn btn-secondary" onclick="requestAccess('${f.name}', 'preview')">Peržiūrėti prieš viešinimą</button>
                    <button class="btn" onclick="requestAccess('${f.name}', 'download')">Atsisiųsti</button>
                `;
                grid.appendChild(card);
            });
        }

        // Other functions (requestAccess with 3s/5s timer, settings, etc.) same as dashboard
        function requestAccess(fileName, type) {
            // timerSecs = 3 for dev
        }
    </script>
</body>
</html>
